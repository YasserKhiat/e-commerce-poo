<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - E-Commerce Poo'">Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="row g-4 align-items-start">
        <div class="col-lg-6">
            <img class="img-fluid rounded-4 border w-100 object-fit-cover product-detail-image"
                 th:src="${product.imageName == null or product.imageName == 'default-product.svg'} ? @{/images/default-product.svg} : @{/uploads/{img}(img=${product.imageName})}"
                 alt="Product image">
        </div>
        <div class="col-lg-6">
            <h1 class="fw-bold" th:text="${product.name}">Product</h1>
            <p class="text-muted" th:text="${product.description}">Description</p>
            <h2 class="h4 text-success fw-bold" th:text="${'$' + product.price}">$0.00</h2>
            <p class="mb-3">Stock: <strong th:text="${product.stock}">0</strong></p>
            <a class="btn btn-primary" sec:authorize="isAuthenticated()" th:href="@{/orders/new}">Order This Product</a>
            <a class="btn btn-outline-secondary" th:href="@{/products}">Back to Products</a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
