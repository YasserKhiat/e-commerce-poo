<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Commerce Poo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card border-0 rounded-4 overflow-hidden" data-reveal>
                <div class="card-body p-4 p-md-5">
                    <div class="row g-4 align-items-center">
                        <div class="col-lg-6">
                            <p class="hero-kicker mb-2">Member Access</p>
                            <h1 class="display-6 fw-bold mb-3">Welcome Back</h1>
                            <p class="text-muted mb-4">Sign in to access your dashboard and continue where you left off.</p>

                            <div class="d-flex flex-wrap gap-2">
                                <span class="badge-pill bg-success-subtle text-success-emphasis">Secure Login</span>
                                <span class="badge-pill bg-primary-subtle text-primary">Role Aware</span>
                                <span class="badge-pill bg-warning-subtle text-warning-emphasis">Fast Navigation</span>
                            </div>
                        </div>

                        <div class="col-lg-6">
                            <div class="p-4 rounded-4 bg-white border">
                                <div class="alert alert-success" th:if="${param.registered}">Account created. Please login.</div>
                                <div class="alert alert-danger" th:if="${param.error}">Invalid email or password.</div>
                                <div class="alert alert-info" th:if="${param.logout}">You have been logged out.</div>

                                <form th:action="@{/login}" method="post" class="row g-3">
                                    <div class="col-12">
                                        <label class="form-label" for="email">Email</label>
                                        <input id="email" name="email" type="email" class="form-control" required>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label" for="password">Password</label>
                                        <input id="password" name="password" type="password" class="form-control" required>
                                    </div>
                                    <div class="col-12 d-grid">
                                        <button class="btn btn-primary btn-lg" type="submit">Login</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <p class="mt-4 mb-0 text-muted text-center">No account?
                        <a th:href="@{/register}" class="text-decoration-none fw-semibold">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
