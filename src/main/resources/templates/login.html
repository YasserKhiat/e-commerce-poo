<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Commerce Poo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h3 fw-bold mb-3">Welcome Back</h1>
                    <p class="text-muted mb-4">Sign in to continue shopping.</p>

                    <div class="alert alert-success" th:if="${param.registered}">Account created. Please login.</div>
                    <div class="alert alert-danger" th:if="${param.error}">Invalid email or password.</div>
                    <div class="alert alert-info" th:if="${param.logout}">You have been logged out.</div>

                    <form th:action="@{/login}" method="post" class="row g-3">
                        <div class="col-12">
                            <label class="form-label" for="email">Email</label>
                            <input id="email" name="email" type="email" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="password">Password</label>
                            <input id="password" name="password" type="password" class="form-control" required>
                        </div>
                        <div class="col-12 d-grid">
                            <button class="btn btn-primary btn-lg" type="submit">Login</button>
                        </div>
                    </form>

                    <p class="mt-4 mb-0 text-muted">No account?
                        <a th:href="@{/register}" class="text-decoration-none">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
