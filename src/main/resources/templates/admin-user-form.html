<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle} + ' - Admin'">Admin User Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="hero-card p-4 rounded-4 mb-3" data-reveal>
        <p class="hero-kicker mb-2">Admin User Editor</p>
        <h1 class="h3 fw-bold mb-0" th:text="${formTitle}">Edit User</h1>
    </div>

    <div class="card border-0 rounded-4" data-reveal>
        <div class="card-body p-4">
            <form th:object="${user}" th:action="@{${formAction}}" method="post" class="row g-3">
                <input type="hidden" th:field="*{id}">

                <div class="col-md-6">
                    <label class="form-label">Name</label>
                    <input class="form-control" th:field="*{name}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input class="form-control" th:field="*{email}">
                </div>
                <div class="col-12">
                    <label class="form-label">Address</label>
                    <textarea class="form-control" th:field="*{address}"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Role</label>
                    <select class="form-select" th:field="*{role}">
                        <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Password (leave blank to keep unchanged)</label>
                    <input type="password" class="form-control" th:field="*{password}">
                </div>
                <div class="col-12">
                    <button class="btn btn-primary" type="submit">Save User</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/users}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
