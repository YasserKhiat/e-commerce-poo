<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - E-Commerce Poo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold mb-0">Browse Products</h1>
        <a sec:authorize="isAuthenticated()" class="btn btn-primary" th:href="@{/orders/new}">Place Order</a>
    </div>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="product : ${products}">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <img class="card-img-top rounded-top-4 product-card-image"
                     th:src="${product.imageName == null or product.imageName == 'default-product.svg'} ? @{/images/default-product.svg} : @{/uploads/{img}(img=${product.imageName})}"
                     alt="Product image">
                <div class="card-body d-flex flex-column">
                    <h2 class="h5 fw-bold" th:text="${product.name}">Name</h2>
                    <p class="text-muted small mb-3" th:text="${product.description}">Description</p>
                    <p class="fw-bold text-success mb-1" th:text="${'$' + product.price}">$0.00</p>
                    <p class="small mb-3">Stock: <span th:text="${product.stock}">0</span></p>
                    <a class="btn btn-outline-dark mt-auto" th:href="@{/products/{id}(id=${product.id})}">View Details</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
