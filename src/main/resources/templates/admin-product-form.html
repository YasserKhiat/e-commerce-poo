<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle} + ' - Admin'">Admin Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="hero-card p-4 rounded-4 mb-3" data-reveal>
        <p class="hero-kicker mb-2">Admin Catalog Editor</p>
        <h1 class="h3 fw-bold mb-0" th:text="${formTitle}">Product Form</h1>
    </div>

    <div class="card border-0 rounded-4" data-reveal>
        <div class="card-body p-4">
            <form th:object="${product}" th:action="@{${formAction}}" method="post" enctype="multipart/form-data" class="row g-3">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{imageName}">

                <div class="col-md-6">
                    <label class="form-label" for="name">Name</label>
                    <input id="name" class="form-control" th:field="*{name}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="price">Price</label>
                    <input id="price" type="number" step="0.01" class="form-control" th:field="*{price}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="stock">Stock</label>
                    <input id="stock" type="number" class="form-control" th:field="*{stock}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                </div>
                <div class="col-12">
                    <label class="form-label" for="description">Description</label>
                    <textarea id="description" rows="3" class="form-control" th:field="*{description}"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="imageFile">Product Image</label>
                    <input id="imageFile" name="imageFile" type="file" accept="image/*" class="form-control">
                </div>
                <div class="col-md-6" th:if="${product.imageName != null}">
                    <label class="form-label">Current Image</label>
                    <div>
                        <img class="rounded-3 border product-thumb"
                             th:src="${product.imageName == 'default-product.svg'} ? @{/images/default-product.svg} : @{/uploads/{img}(img=${product.imageName})}"
                             alt="Current image">
                    </div>
                </div>
                <div class="col-12">
                    <button class="btn btn-primary" type="submit">Save Product</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/products}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
