<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Order - Ecommerce Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="page-title mb-0">Create Order</h1>
        <a class="btn btn-outline-secondary" th:href="@{/orders}">Back to Orders</a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form th:object="${orderForm}" th:action="@{/orders/save}" method="post" class="row g-3">
                <div class="col-md-8">
                    <label for="userId" class="form-label">User</label>
                    <select id="userId" class="form-select" th:field="*{userId}">
                        <option value="">Select user</option>
                        <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.name + ' (' + user.email + ')'}"></option>
                    </select>
                    <div class="text-danger small" th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}"></div>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Create Order</button>
                    <a class="btn btn-light" th:href="@{/orders}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
