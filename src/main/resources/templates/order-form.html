<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Order - E-Commerce Poo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4" data-reveal>
        <h1 class="h3 fw-bold mb-0">Create Order</h1>
        <a class="btn btn-outline-secondary" th:href="@{/products}">Back to Products</a>
    </div>

    <div class="card border-0 rounded-4" data-reveal>
        <div class="card-body p-4">
            <form th:object="${orderForm}" th:action="@{/orders/save}" method="post" class="row g-3">
                <div class="col-12" th:if="${errorMessage}">
                    <div class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>
                </div>

                <div class="col-12">
                    <h2 class="h5 mb-3">Products and Quantities</h2>
                    <div class="table-responsive">
                        <table class="table table-bordered align-middle">
                            <thead>
                            <tr>
                                <th>Product</th>
                                <th>Available Stock</th>
                                <th>Quantity to Order</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item, iterStat : *{items}">
                                <td>
                                    <span th:text="${item.productName}"></span>
                                    <input type="hidden" th:field="*{items[__${iterStat.index}__].productId}">
                                    <input type="hidden" th:field="*{items[__${iterStat.index}__].productName}">
                                    <input type="hidden" th:field="*{items[__${iterStat.index}__].availableStock}">
                                </td>
                                <td th:text="${item.availableStock}"></td>
                                <td>
                                    <input type="number" min="0" class="form-control" th:field="*{items[__${iterStat.index}__].quantity}">
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Confirm Order</button>
                    <a class="btn btn-light" th:href="@{/products}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
