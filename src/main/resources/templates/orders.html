<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Ecommerce Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="page-title mb-0">Orders</h1>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/}">Dashboard</a>
            <a class="btn btn-primary" th:href="@{/orders/new}">Create Order</a>
        </div>
    </div>

    <div class="alert alert-success" role="alert" th:if="${successMessage}" th:text="${successMessage}"></div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>User</th>
                        <th>Total</th>
                        <th>Items</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="6" class="text-center text-muted py-4">No orders found.</td>
                    </tr>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.id}"></td>
                        <td th:text="${order.date}"></td>
                        <td th:text="${order.user != null ? order.user.name : '-'}"></td>
                        <td th:text="${order.total}"></td>
                        <td th:text="${#lists.size(order.orderItems)}"></td>
                        <td>
                            <a class="btn btn-sm btn-danger"
                               th:href="@{/orders/delete/{id}(id=${order.id})}"
                               onclick="return confirm('Delete this order?');">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
