<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Products - E-Commerce Poo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 fw-bold mb-0">Product Management</h1>
        <a class="btn btn-primary" th:href="@{/admin/products/new}">Add Product</a>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="5" class="text-center text-muted py-4">No products yet.</td>
                    </tr>
                    <tr th:each="product : ${products}">
                        <td>
                            <img class="rounded-3 border product-thumb"
                                 th:src="${product.imageName == null or product.imageName == 'default-product.svg'} ? @{/images/default-product.svg} : @{/uploads/{img}(img=${product.imageName})}"
                                 alt="Product image">
                        </td>
                        <td th:text="${product.name}"></td>
                        <td th:text="${'$' + product.price}"></td>
                        <td th:text="${product.stock}"></td>
                        <td class="d-flex gap-2">
                            <a class="btn btn-sm btn-warning" th:href="@{/admin/products/edit/{id}(id=${product.id})}">Edit</a>
                            <a class="btn btn-sm btn-danger" th:href="@{/admin/products/delete/{id}(id=${product.id})}" onclick="return confirm('Delete this product?');">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
