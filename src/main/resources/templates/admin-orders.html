<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Orders - E-Commerce Poo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h1 class="h3 fw-bold mb-3">Order Management</h1>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.id}"></td>
                        <td th:text="${order.user.name}"></td>
                        <td th:text="${order.date}"></td>
                        <td th:text="${'$' + order.total}"></td>
                        <td>
                            <div class="dropdown">
                                <button class="btn btn-sm btn-outline-dark dropdown-toggle" data-bs-toggle="dropdown" th:text="${order.status}"></button>
                                <ul class="dropdown-menu">
                                    <li th:each="status : ${statuses}">
                                        <a class="dropdown-item"
                                           th:text="${status}"
                                           th:href="@{/admin/orders/status/{id}(id=${order.id}, value=${status})}"></a>
                                    </li>
                                </ul>
                            </div>
                        </td>
                        <td>
                            <a class="btn btn-sm btn-danger" th:href="@{/admin/orders/delete/{id}(id=${order.id})}" onclick="return confirm('Delete this order?');">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
