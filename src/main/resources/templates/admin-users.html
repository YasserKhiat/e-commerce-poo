<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Users - E-Commerce Poo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="hero-card p-4 rounded-4 mb-3" data-reveal>
        <p class="hero-kicker mb-2">Admin Accounts</p>
        <h1 class="h3 fw-bold mb-0">User Management</h1>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card border-0 rounded-4" data-reveal>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Address</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.name}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.address}"></td>
                        <td><span class="badge text-bg-dark" th:text="${user.role}"></span></td>
                        <td class="d-flex gap-2">
                            <a class="btn btn-sm btn-warning" th:href="@{/admin/users/edit/{id}(id=${user.id})}">Edit</a>
                            <a class="btn btn-sm btn-danger" th:href="@{/admin/users/delete/{id}(id=${user.id})}" onclick="return confirm('Delete this user?');">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
