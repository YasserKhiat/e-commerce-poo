<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - E-Commerce Poo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="hero-card p-4 p-md-5 mb-4 rounded-4">
        <h1 class="display-6 fw-bold">Hello, <span th:text="${currentUser.name}">User</span></h1>
        <p class="text-muted">Browse products and manage your orders.</p>
        <a class="btn btn-primary" th:href="@{/products}">Shop Now</a>
        <a class="btn btn-outline-secondary" th:href="@{/my-orders}">My Orders</a>
    </div>
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body">
                    <p class="text-muted mb-1">Products Available</p>
                    <p class="display-6 mb-0" th:text="${productCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body">
                    <p class="text-muted mb-1">Your Orders</p>
                    <p class="display-6 mb-0" th:text="${orderCount}">0</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
