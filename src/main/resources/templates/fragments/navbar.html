<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:fragment="navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">E-Commerce Poo</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">Products</a></li>
                <li class="nav-item" sec:authorize="hasAnyRole('USER','ADMIN')"><a class="nav-link" th:href="@{/my-orders}">My Orders</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/admin}">Admin</a></li>
            </ul>
            <div class="d-flex gap-2">
                <a sec:authorize="isAnonymous()" class="btn btn-sm btn-outline-light" th:href="@{/login}">Login</a>
                <a sec:authorize="isAnonymous()" class="btn btn-sm btn-primary" th:href="@{/register}">Register</a>
                <a sec:authorize="isAuthenticated()" class="btn btn-sm btn-outline-light" th:href="@{/dashboard}">Dashboard</a>
                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="d-inline">
                    <button class="btn btn-sm btn-danger" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
