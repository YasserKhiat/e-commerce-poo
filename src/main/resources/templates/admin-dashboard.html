<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - E-Commerce Poo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="hero-card p-4 rounded-4 mb-4" data-reveal>
        <p class="hero-kicker mb-2">Control Center</p>
        <h1 class="h3 fw-bold mb-0">Admin Dashboard</h1>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card border-0 rounded-4" data-reveal>
                <div class="card-body">
                    <p class="text-muted mb-1">Products</p>
                    <p class="display-6 mb-0" th:text="${productCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 rounded-4" data-reveal>
                <div class="card-body">
                    <p class="text-muted mb-1">Users</p>
                    <p class="display-6 mb-0" th:text="${userCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 rounded-4" data-reveal>
                <div class="card-body">
                    <p class="text-muted mb-1">Orders</p>
                    <p class="display-6 mb-0" th:text="${orderCount}">0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3" data-reveal>
        <div class="col-md-4">
            <a class="card border-0 p-4 text-decoration-none text-dark h-100" th:href="@{/admin/products}">
                <h2 class="h5 fw-bold mb-2">Manage Products</h2>
                <p class="text-muted mb-0">Create, edit, and control stock and images.</p>
            </a>
        </div>
        <div class="col-md-4">
            <a class="card border-0 p-4 text-decoration-none text-dark h-100" th:href="@{/admin/users}">
                <h2 class="h5 fw-bold mb-2">Manage Users</h2>
                <p class="text-muted mb-0">Update user roles and account details.</p>
            </a>
        </div>
        <div class="col-md-4">
            <a class="card border-0 p-4 text-decoration-none text-dark h-100" th:href="@{/admin/orders}">
                <h2 class="h5 fw-bold mb-2">Manage Orders</h2>
                <p class="text-muted mb-0">Track order statuses and oversee fulfillment.</p>
            </a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
