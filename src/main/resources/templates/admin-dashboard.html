<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - E-Commerce Poo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h1 class="h3 fw-bold mb-4">Admin Dashboard</h1>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body">
                    <p class="text-muted mb-1">Products</p>
                    <p class="display-6 mb-0" th:text="${productCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body">
                    <p class="text-muted mb-1">Users</p>
                    <p class="display-6 mb-0" th:text="${userCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body">
                    <p class="text-muted mb-1">Orders</p>
                    <p class="display-6 mb-0" th:text="${orderCount}">0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 flex-wrap">
        <a class="btn btn-dark" th:href="@{/admin/products}">Manage Products</a>
        <a class="btn btn-dark" th:href="@{/admin/users}">Manage Users</a>
        <a class="btn btn-dark" th:href="@{/admin/orders}">Manage Orders</a>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
