<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Manager Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container py-5">
    <div class="hero mb-4">
        <h1 class="display-6 fw-bold mb-2">Ecommerce Manager</h1>
        <p class="text-muted mb-0">Simple Spring Boot + Thymeleaf order management dashboard.</p>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card stat-card border-0 shadow-sm">
                <div class="card-body">
                    <h2 class="h6 text-muted">Products</h2>
                    <p class="display-6 mb-0" th:text="${productCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card border-0 shadow-sm">
                <div class="card-body">
                    <h2 class="h6 text-muted">Users</h2>
                    <p class="display-6 mb-0" th:text="${userCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card border-0 shadow-sm">
                <div class="card-body">
                    <h2 class="h6 text-muted">Orders</h2>
                    <p class="display-6 mb-0" th:text="${orderCount}">0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex flex-wrap gap-2">
        <a class="btn btn-primary" th:href="@{/products}">Manage Products</a>
        <a class="btn btn-success" th:href="@{/users}">Manage Users</a>
        <a class="btn btn-dark" th:href="@{/orders}">Manage Orders</a>
    </div>
</div>
</body>
</html>
