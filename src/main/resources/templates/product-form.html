<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle} + ' - Ecommerce Manager'">Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="page-title mb-0" th:text="${formTitle}">Product Form</h1>
        <a class="btn btn-outline-secondary" th:href="@{/products}">Back to Products</a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form th:object="${product}" th:action="@{${formAction}}" method="post" class="row g-3">
                <input type="hidden" th:field="*{id}" th:value="*{id}">

                <div class="col-md-6">
                    <label for="name" class="form-label">Name</label>
                    <input id="name" type="text" class="form-control" th:field="*{name}" placeholder="Product name">
                    <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="col-md-6">
                    <label for="price" class="form-label">Price</label>
                    <input id="price" type="number" step="0.01" class="form-control" th:field="*{price}" placeholder="0.00">
                    <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>

                <div class="col-md-6">
                    <label for="stock" class="form-label">Stock</label>
                    <input id="stock" type="number" class="form-control" th:field="*{stock}" placeholder="0">
                    <div class="text-danger small" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                </div>

                <div class="col-12">
                    <label for="description" class="form-label">Description</label>
                    <textarea id="description" class="form-control" rows="4" th:field="*{description}" placeholder="Short product description"></textarea>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a class="btn btn-light" th:href="@{/products}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
