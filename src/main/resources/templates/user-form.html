<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle} + ' - Ecommerce Manager'">User Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="page-title mb-0" th:text="${formTitle}">User Form</h1>
        <a class="btn btn-outline-secondary" th:href="@{/users}">Back to Users</a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form th:object="${user}" th:action="@{${formAction}}" method="post" class="row g-3">
                <input type="hidden" th:field="*{id}" th:value="*{id}">

                <div class="col-md-6">
                    <label for="name" class="form-label">Name</label>
                    <input id="name" type="text" class="form-control" th:field="*{name}" placeholder="Full name">
                    <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" type="email" class="form-control" th:field="*{email}" placeholder="email@example.com">
                    <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="col-12">
                    <label for="address" class="form-label">Address</label>
                    <textarea id="address" class="form-control" rows="3" th:field="*{address}" placeholder="Customer address"></textarea>
                    <div class="text-danger small" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a class="btn btn-light" th:href="@{/users}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
