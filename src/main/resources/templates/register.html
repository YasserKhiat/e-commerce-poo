<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - E-Commerce Poo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card border-0 rounded-4" data-reveal>
                <div class="card-body p-4 p-md-5">
                    <div class="row g-4 align-items-center">
                        <div class="col-lg-5">
                            <p class="hero-kicker mb-2">Create Your Account</p>
                            <h1 class="display-6 fw-bold mb-3">Join the Store</h1>
                            <p class="text-muted mb-4">Get your personal dashboard, track your orders, and enjoy a polished shopping experience.</p>
                            <ul class="text-muted ps-3 mb-0">
                                <li class="mb-2">Quick sign-up form</li>
                                <li class="mb-2">Secure password encryption</li>
                                <li>Ready for ordering in seconds</li>
                            </ul>
                        </div>

                        <div class="col-lg-7">
                            <div class="p-4 rounded-4 bg-white border">
                                <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                                <form th:object="${registrationForm}" th:action="@{/register}" method="post" class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label" for="name">Full Name</label>
                                        <input id="name" type="text" class="form-control" th:field="*{name}">
                                        <div class="text-danger small" th:errors="*{name}" th:if="${#fields.hasErrors('name')}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="email">Email</label>
                                        <input id="email" type="email" class="form-control" th:field="*{email}">
                                        <div class="text-danger small" th:errors="*{email}" th:if="${#fields.hasErrors('email')}"></div>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label" for="address">Address</label>
                                        <textarea id="address" rows="2" class="form-control" th:field="*{address}"></textarea>
                                        <div class="text-danger small" th:errors="*{address}" th:if="${#fields.hasErrors('address')}"></div>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label" for="password">Password</label>
                                        <input id="password" type="password" class="form-control" th:field="*{password}">
                                        <div class="text-danger small" th:errors="*{password}" th:if="${#fields.hasErrors('password')}"></div>
                                    </div>
                                    <div class="col-12 d-grid">
                                        <button class="btn btn-primary btn-lg" type="submit">Register</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
